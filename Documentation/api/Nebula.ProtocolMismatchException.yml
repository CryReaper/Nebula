  source:
    href: https://github.com/Heavenlode/Nebula/blob/020003aa6e3ee9345d4a07737ef69324abd3d5ed/addons/Nebula/Core/ProtocolMismatchException.cs
  assemblies:
  - Nebula
  namespace: Nebula
  summary: >-
    Thrown on the client when the server rejects the connection because the two builds

    have different protocol hashes (different scenes, properties, functions, or wire

    format version). Subscribe to <xref href="Nebula.NetRunner.OnProtocolMismatch" data-throw-if-not-resolved="false"></xref> to handle

    this without an exception (e.g. to show an "update required" screen); if no handler

    is subscribed, NetRunner throws this from its event pump.
  example: []
